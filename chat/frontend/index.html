<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0">
    <link rel="stylesheet" href="../frontend/css/style.css">
    <link rel="shortcut icon" href="../frontend/images/web-chat.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
<style>body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #1e1e1e;
    color: #d4d4d4;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.container {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    max-width: 1200px;
    background-color: #252526;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    border-radius: 8px;
    overflow: hidden;
}

.login, .chat {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
}

.chat {
    display: none; /* Esconder o chat até o login */
}

.login__form, .chat__form {
    display: flex;
    width: 100%;
    padding: 1rem;
}

.login__input, .chat__input {
    flex: 1;
    padding: 1rem;
    margin-right: 1rem;
    border: none;
    border-radius: 4px;
    background-color: #3c3c3c;
    color: #d4d4d4;
}

.login__button, .chat__button, .chat__code-button, .chat__image-button, .code-popup__close-button, .code-popup__button {
    padding: 1rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

.login__button, .chat__button, .chat__code-button, .chat__image-button {
    background-color: #0a84ff;
    color: #fff;
}

.chat__messages {
    flex: 1;
    width: 100%;
    padding: 1rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.message-self, .message-other {
    padding: 1rem;
    border-radius: 8px;
    max-width: 70%;
    word-wrap: break-word;
}

.message-self {
    background-color: #007acc;
    color: #fff;
    align-self: flex-end;
}

.message-other {
    background-color: #444;
    color: #fff;
    align-self: flex-start;
}

/* Estilos para o nome do usuário */
.message-username {
    display: block;
    margin-bottom: 0.2rem; /* Espaço entre o nome do usuário e a mensagem */
    font-weight: bold;
}

.message-content {
    display: block;
}

/* Estilos para imagens */
.message-img-container {
    text-align: center;
}

.message-img {
    max-width: 100%;
    border-radius: 8px;
}

/* Popup de código */
.code-popup {
    display: none; /* Esconder a popup até ser clicada */
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.8);
    justify-content: center;
    align-items: center;
}

.code-popup__content {
    background-color: #1e1e1e;
    padding: 2rem;
    border-radius: 8px;
    width: 80%;
    max-width: 800px;
}

.code-popup__textarea {
    width: 100%;
    height: 200px;
    background-color: #252526;
    color: #d4d4d4;
    border: none;
    padding: 1rem;
    border-radius: 4px;
    font-family: 'Courier New', Courier, monospace;
}

.code-popup__console {
    background-color: #1e1e1e;
    color: #d4d4d4;
    padding: 1rem;
    margin-top: 1rem;
    border-radius: 4px;
}

.code-popup__language-selector {
    margin-bottom: 1rem;
}

.code-popup__close-button {
    background-color: #e81123;
    color: #fff;
    float: right;
    font-size: 1.2rem;
    margin-top: -2rem;
    margin-right: -2rem;
}

.code-popup__button {
    background-color: #0a84ff;
    color: #fff;
    margin-top: 1rem;
}
</style>
    <title>ChatCode</title>
</head>
<body>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-auth.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typescript/4.6.2/typescript.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-storage.js"></script>

    <section class="container">
        <section class="login">
            <h2>ChatCode <br>Login</h2>
            <form class="login__form">
                <input type="text" class="login__input" placeholder="Seu nome" required />
                <button type="submit" class="login__button">Entrar</button>
            </form>
        </section>

        <section class="chat">
            <section class="chat__messages">
                <!-- Mensagens do chat serão exibidas aqui -->
            </section>

            <form class="chat__form">
                <input type="text" class="chat__input" placeholder="Digite uma mensagem" required />
                <button type="submit" class="chat__button">
                    <span class="material-symbols-outlined">send</span>
                </button>
                <button type="button" class="chat__code-button">Code</button>
                <input type="file" id="imageInput" style="display:none;" />
                <button type="button" class="chat__image-button">
                    <span class="material-symbols-outlined">image</span>
                </button>
            </form>
            

            <!-- Tela de código -->
            <div class="code-popup" id="code-popup">
                <div class="code-popup__content">
                    <!-- Botão de fechar -->
                    <button class="code-popup__close-button">❌</button>
                    <h2>Coloque seu código</h2>
                    <select class="code-popup__language-selector">
                        <option value="javascript">JavaScript</option>
                        <option value="typescript">TypeScript</option>
                    </select>
                    <!-- Contêiner para o textarea e a numeração das linhas -->
                    <div class="code-popup__code-container">
                        <!-- Numeração das linhas -->
                        <div class="code-popup__line-numbers"></div>
                        <!-- Textarea para inserir código JavaScript ou TypeScript -->
                        <textarea class="code-popup__textarea" placeholder="Insira seu código aqui"></textarea>
                        <pre class="code-popup__highlighting"></pre>
                    </div>
                    <!-- Botão para executar o código inserido -->
                    <button class="code-popup__button">Executar</button>
                    <!-- Elemento para exibir a saída do console -->
                    <div class="code-popup__console" id="code-popup-console"></div>
                </div>
            </div>
        </section>
    </section>

    <script src="./js/script.js"></script>
</body>
</html>
